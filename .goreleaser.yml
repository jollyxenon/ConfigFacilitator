version: 2

project_name: cfgfc

before:
  hooks:
    - go mod tidy

builds:
  - id: cfgfc
    main: ./cmd/cfgfc
    binary: cfgfc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: cfgfc
    ids:
      - cfgfc
    name_template: >-
      cfgfc_{{ trimPrefix .Version "v" }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: jollyxenon
    name: ConfigFacilitator
